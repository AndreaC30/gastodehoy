# Copia a docker-compose.override.yml (gitignored) para publicar :8000 en local.
# Compose fusiona override + docker-compose.yml sin flags extra:
#   cp docker-compose.override.example.yml docker-compose.override.yml
#   docker compose up -d --build
#
# Alternativa versionada: docker compose -f docker-compose.yml -f docker-compose.dev.yml
services:
  app:
    ports:
      - "8000:8000"
