services:
  app:
    build: .
    environment:
      # Archivo SQLite dentro del volumen montado en /app/data.
      DATABASE_URL: sqlite:////app/data/gastodehoy.db
      TIMEZONE: ${TIMEZONE:-Europe/Madrid}
      APP_SECRET: ${APP_SECRET:-change-me-in-prod}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # SMTP: deben existir en el .env del host; Compose las inyecta aqui.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-false}
      # Web Push (PWA notifications)
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:admin@gastodehoy.kyadigital.es}
    volumes:
      # Persistencia: el archivo .db vive en ./data/ del host.
      - ./data:/app/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  backend:
    driver: bridge
    name: gastodehoy_backend
