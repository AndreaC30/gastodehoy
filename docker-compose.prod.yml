# Overlay para producción: HTTPS por Caddy + cookies seguras.
#
# Uso recomendado en servidor tras git pull (rebuild Vite dentro de la imagen):
#   ./scripts/deploy-docker-prod.sh
# Manualmente:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --force-recreate app
#
# Requiere en .env:
#   SITE_DOMAIN=gastos.tudominio.com
#   ACME_EMAIL=tu-email@ejemplo.com
#   APP_SECRET=<openssl rand -hex 32>
#   COOKIE_SECURE=true
services:
  app:
    # Solo expuesto a la red interna; Caddy hace de puerta.
    ports: []
    environment:
      DATABASE_URL: sqlite:////app/data/gastodehoy.db
      TIMEZONE: ${TIMEZONE:-Europe/Madrid}
      APP_SECRET: ${APP_SECRET}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: ${SITE_DOMAIN}
      TRUST_FORWARDED_FOR: "true"
    networks:
      backend:
        aliases:
          - app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      app:
        condition: service_healthy
    networks:
      - backend

volumes:
  caddy_data:
  caddy_config:
