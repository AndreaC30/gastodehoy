# Overlay para producción: HTTPS por Caddy + cookies seguras.
#
# Uso:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Requiere en .env:
#   SITE_DOMAIN=gastos.tudominio.com
#   ACME_EMAIL=tu-email@ejemplo.com
#   APP_SECRET=<openssl rand -hex 32>
#   POSTGRES_PASSWORD=<otra clave fuerte, distinta del default>
#   COOKIE_SECURE=true
services:
  db:
    # No publicamos 5432 en producción.
    ports: []

  app:
    # Solo expuesto a la red interna; Caddy hace de puerta.
    ports: []
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-gastodehoy}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-gastodehoy}
      TIMEZONE: ${TIMEZONE:-Europe/Madrid}
      APP_SECRET: ${APP_SECRET}
      SESSION_TTL_DAYS: ${SESSION_TTL_DAYS:-30}
      COOKIE_SECURE: "true"
      COOKIE_DOMAIN: ${SITE_DOMAIN}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      SITE_DOMAIN: ${SITE_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
