    <style>
      /* !important so Tailwind can never override */
      html, body { background: #0f172a !important; margin: 0; min-height: 100dvh; }
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;

        transition: opacity 0.3s ease;
      }
      #splash.fade { opacity: 0; pointer-events: none; }
      #splash-spinner {
        width: 32px; height: 32px;
        border: 3px solid rgb(30 41 59);
        border-top-color: rgb(34 211 238);
        border-radius: 50%;
        animation: gdh-spin 0.7s linear infinite;
      }
      @keyframes gdh-spin { to { transform: rotate(360deg); } }
      #splash-msg {
        max-width: 260px; text-align: center;
        font-size: 13px; font-weight: 500;
        color: rgb(148 163 184);
        line-height: 1.5; padding: 0 1rem;

    <div id="splash">
